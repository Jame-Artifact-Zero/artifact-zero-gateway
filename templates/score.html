{% extends "base.html" %}
{% block title %}Score — Artifact Zero{% endblock %}
{% block body_class %}page-score{% endblock %}

{% block content %}
<div class="az-page">

  <div class="az-card az-intro">
    <h2>Score</h2>
    <p>Paste what you received. See the structural integrity analysis returned by the NTI engine.</p>
  </div>

  <div class="az-card" id="scoreInputCard">
    <div class="az-section">
      <textarea id="scoreInput" class="az-textarea" placeholder="Paste what someone sent you..."></textarea>
    </div>
    <div class="az-section az-actions">
      <button class="az-btn primary" id="scoreBtn" type="button">Score</button>
    </div>
  </div>

  <div id="scoreResults" style="display:none;"></div>

  <div class="az-section az-actions" id="scoreResetBar" style="display:none;">
    <button class="az-btn" id="scoreNewBtn" type="button">New text</button>
    <button class="az-btn danger" id="scoreClearBtn" type="button">Clear</button>
  </div>

</div>
{% endblock %}

{% block scripts %}
<style>
  .sc-block { margin-bottom: 16px; }
  .sc-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .sc-score {
    font-family: var(--mono); font-size: 40px; font-weight: 700; line-height: 1;
  }
  .sc-sublabel {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    letter-spacing: 1px; margin-top: 4px;
  }
  .sc-kv {
    display: grid; grid-template-columns: auto 1fr;
    gap: 4px 12px; font-size: 13px; line-height: 1.5;
  }
  .sc-k {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    letter-spacing: 0.5px; white-space: nowrap; padding-top: 1px;
  }
  .sc-v { color: var(--text); word-break: break-word; }
  .sc-tag {
    display: inline-block; font-family: var(--mono); font-size: 10px;
    letter-spacing: 0.5px; padding: 4px 8px; border-radius: 4px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); margin: 2px 4px 2px 0;
  }
  .sc-tag.confirmed { border-color: rgba(239,68,68,0.5); color: var(--red); }
  .sc-tag.probable { border-color: rgba(245,158,11,0.5); color: var(--amber); }
  .sc-tag.clear { border-color: rgba(0,232,156,0.3); color: var(--accent); }
  .sc-bar-track {
    height: 4px; background: var(--border); border-radius: 2px;
    overflow: hidden; margin-top: 3px;
  }
  .sc-bar-fill { height: 100%; border-radius: 2px; }
  .sc-dim-row { margin-bottom: 10px; }
  .sc-dim-head {
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .sc-dim-name { font-family: var(--mono); font-size: 11px; color: var(--text); }
  .sc-dim-val { font-family: var(--mono); font-size: 12px; font-weight: 700; }
</style>
<script>
(() => {
  'use strict';

  const elInput = document.getElementById('scoreInput');
  const elBtn = document.getElementById('scoreBtn');
  const elResults = document.getElementById('scoreResults');
  const elInputCard = document.getElementById('scoreInputCard');
  const elResetBar = document.getElementById('scoreResetBar');

  function esc(s) {
    if (s === null || s === undefined) return '—';
    const d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function stateTag(val) {
    const s = String(val);
    if (s.includes('CONFIRMED')) return '<span class="sc-tag confirmed">' + esc(s) + '</span>';
    if (s.includes('PROBABLE')) return '<span class="sc-tag probable">' + esc(s) + '</span>';
    if (s.includes('FALSE')) return '<span class="sc-tag clear">' + esc(s) + '</span>';
    return '<span class="sc-tag">' + esc(s) + '</span>';
  }

  function scoreColor(n) {
    if (n >= 80) return 'var(--accent)';
    if (n >= 60) return 'var(--amber)';
    return 'var(--red)';
  }

  function renderKV(obj, skip) {
    const keys = Object.keys(obj).filter(k => !(skip || []).includes(k));
    if (!keys.length) return '<div style="color:var(--muted);font-size:13px;">Empty.</div>';
    let html = '<div class="sc-kv">';
    keys.forEach(k => {
      const v = obj[k];
      let display;
      if (v === null || v === undefined) display = '—';
      else if (typeof v === 'boolean') display = v ? 'true' : 'false';
      else if (typeof v === 'object') display = '<code style="font-size:11px;color:var(--muted);word-break:break-all;">' + esc(JSON.stringify(v)) + '</code>';
      else display = esc(v);
      html += '<div class="sc-k">' + esc(k) + '</div><div class="sc-v">' + display + '</div>';
    });
    html += '</div>';
    return html;
  }

  function card(title, content) {
    return '<div class="az-card sc-block"><div class="sc-label">' + esc(title) + '</div>' + content + '</div>';
  }

  function render(data) {
    let html = '';

    /* ── NII SCORE ── */
    const nii = data.nii || {};
    if (nii.nii_score !== undefined) {
      const color = scoreColor(nii.nii_score);
      let inner = '<div class="sc-score" style="color:' + color + '">' + esc(nii.nii_score) + '</div>';
      inner += '<div class="sc-sublabel">' + esc(nii.nii_label) + ' · v' + esc(data.version || '') + '</div>';
      html += card('NII STRUCTURAL INTEGRITY', inner);
    }

    /* ── NII DIMENSIONS (render raw fields from nii object) ── */
    const dimKeys = Object.keys(nii).filter(k => k.startsWith('d') && k.includes('_'));
    if (dimKeys.length) {
      let inner = '';
      dimKeys.forEach(k => {
        const val = nii[k];
        if (typeof val !== 'number') return;
        const pct = Math.round(val * 100);
        const color = scoreColor(pct);
        inner += '<div class="sc-dim-row">';
        inner += '<div class="sc-dim-head"><span class="sc-dim-name">' + esc(k) + '</span><span class="sc-dim-val" style="color:' + color + '">' + pct + '%</span></div>';
        inner += '<div class="sc-bar-track"><div class="sc-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
        inner += '</div>';
      });
      html += card('NII DIMENSIONS', inner);
    }

    /* ── NII DETAIL ── */
    if (nii.detail && typeof nii.detail === 'object') {
      html += card('NII DETAIL', renderKV(nii.detail));
    }

    /* ── TILT TAXONOMY ── */
    const tilt = data.tilt_taxonomy;
    if (Array.isArray(tilt)) {
      let inner;
      if (tilt.length === 0) {
        inner = '<div style="color:var(--muted);font-size:13px;">None detected.</div>';
      } else {
        inner = tilt.map(t => '<span class="sc-tag">' + esc(t) + '</span>').join('');
      }
      html += card('TILT TAXONOMY', inner);
    }

    /* ── PARENT FAILURE MODES ── */
    const pfm = data.parent_failure_modes;
    if (pfm && typeof pfm === 'object') {
      let inner = '';
      Object.keys(pfm).forEach(mode => {
        const obj = pfm[mode];
        const state = obj[mode.toLowerCase() + '_state'] || obj.state || '';
        inner += '<div style="margin-bottom:10px;">';
        inner += '<div style="font-family:var(--mono);font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px;">' + esc(mode) + ' ' + stateTag(state) + '</div>';
        inner += renderKV(obj, [mode.toLowerCase() + '_state', 'state']);
        inner += '</div>';
      });
      html += card('PARENT FAILURE MODES', inner);
    }

    /* ── INTERACTION MATRIX ── */
    const im = data.interaction_matrix;
    if (im && typeof im === 'object') {
      let inner = '';
      if (im.dominance_detected) {
        inner += '<div style="margin-bottom:8px;"><span class="sc-k">dominance_detected</span> ';
        inner += im.dominance_detected.map(d => '<span class="sc-tag">' + esc(d) + '</span>').join('');
        inner += '</div>';
      }
      if (Array.isArray(im.pairwise)) {
        im.pairwise.forEach(p => {
          inner += '<div class="sc-kv" style="margin-bottom:4px;"><div class="sc-k">' + esc(p.pair) + '</div><div class="sc-v">' + esc(p.note) + '</div></div>';
        });
      }
      if (im.triadic) {
        inner += '<div class="sc-kv" style="margin-top:6px;"><div class="sc-k">' + esc(im.triadic.combo) + '</div><div class="sc-v">' + esc(im.triadic.note) + '</div></div>';
      }
      html += card('INTERACTION MATRIX', inner);
    }

    /* ── LAYERS ── */
    const layers = data.layers;
    if (layers && typeof layers === 'object') {
      let inner = '';
      Object.keys(layers).forEach(lk => {
        const lv = layers[lk];
        inner += '<div style="margin-bottom:10px;">';
        inner += '<div style="font-family:var(--mono);font-size:11px;font-weight:600;color:var(--text);margin-bottom:4px;">' + esc(lk) + '</div>';
        if (typeof lv === 'object' && lv !== null) {
          inner += renderKV(lv);
        } else {
          inner += '<div class="sc-v">' + esc(lv) + '</div>';
        }
        inner += '</div>';
      });
      html += card('LAYERS', inner);
    }

    /* ── V3 ENFORCEMENT ── */
    if (data.v3 && typeof data.v3 === 'object') {
      html += card('V3 ENFORCEMENT', renderKV(data.v3));
    }

    /* ── TELEMETRY ── */
    if (data.telemetry && typeof data.telemetry === 'object') {
      html += card('TELEMETRY', renderKV(data.telemetry));
    }

    elResults.innerHTML = html;
    elResults.style.display = '';
  }

  /* ── ACTIONS ── */
  elBtn.addEventListener('click', async () => {
    const text = elInput.value.trim();
    if (!text) return;

    elBtn.disabled = true;
    elBtn.textContent = 'Scoring...';

    try {
      const res = await fetch('/nti', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();

      if (data.error) {
        elResults.innerHTML = '<div class="az-card"><div style="color:var(--red);font-size:14px;">' + esc(data.error) + '</div></div>';
        elResults.style.display = '';
      } else {
        render(data);
        elInputCard.style.display = 'none';
        elResetBar.style.display = '';
      }
    } catch (e) {
      elResults.innerHTML = '<div class="az-card"><div style="color:var(--red);font-size:14px;">Error: ' + esc(e.message) + '</div></div>';
      elResults.style.display = '';
    } finally {
      elBtn.disabled = false;
      elBtn.textContent = 'Score';
    }
  });

  document.getElementById('scoreNewBtn').addEventListener('click', () => {
    elInput.value = '';
    elInputCard.style.display = '';
    elResults.style.display = 'none';
    elResetBar.style.display = 'none';
    elInput.focus();
  });

  document.getElementById('scoreClearBtn').addEventListener('click', () => {
    elInput.value = '';
    elInputCard.style.display = '';
    elResults.innerHTML = '';
    elResults.style.display = 'none';
    elResetBar.style.display = 'none';
  });
})();
</script>
{% endblock %}
