{% extends "base.html" %}
{% block title %}Score — Artifact Zero{% endblock %}
{% block body_class %}page-score{% endblock %}

{% block content %}
<div class="az-page">

  <div class="az-card">
    <h2>Score</h2>
    <p class="az-muted">
      Paste what you received. Words that carry structural signal will change color.
    </p>
  </div>

  <div class="az-card" id="inputCard">
    <textarea id="inputText" class="az-textarea"
      placeholder="Paste message here..."></textarea>
    <div class="az-actions">
      <button id="runBtn" class="az-btn primary">Score</button>
    </div>
  </div>

  <div id="results" style="display:none;"></div>

</div>
{% endblock %}

{% block scripts %}
<script>
(() => {
  'use strict';

  const input    = document.getElementById('inputText');
  const runBtn   = document.getElementById('runBtn');
  const results  = document.getElementById('results');
  const inputCard = document.getElementById('inputCard');

  /* ── Util ── */
  function esc(s) {
    if (s == null) return '\u2014';
    const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML;
  }

  /* ── Pattern explainer (display only) ── */
  const PATTERN_EXPLAIN = {
    hedge:                  'Hedges soften commitment or responsibility.',
    reassurance:            'Reassurance replaces direct answers.',
    category_blend:         'Blurred categories hide specifics.',
    direct_blame:           'Direct blame assigns fault by name.',
    retroactive_fault:      'Fault is reframed after the fact.',
    passive_aggression:     'Indirect blame or implied fault.',
    tone_escalation:        'Language escalates emotional temperature.',
    authority_finality:     'Authority is asserted to end discussion.',
    threat_consequence:     'Consequences are used as leverage.',
    character_attack:       'The person is attacked, not the argument.',
    shaming_moralizing:     'Moral framing is used to control.',
    gatekeeping_exclusion:  'Access or standing is denied as pressure.',
    dismissal_invalidating: 'The concern is dismissed outright.',
    dominance_posture:      'Language asserts dominance over the exchange.',
    escalation_trigger:     'Words designed to escalate the interaction.'
  };

  /* ── Tilt + FM display tables ── */
  const TILT = {
    T1_REASSURANCE_DRIFT:    'They\'re reassuring instead of addressing the issue.',
    T2_CERTAINTY_INFLATION:  'Certainty claimed without evidence.',
    T3_CONSENSUS_CLAIMS:     'Broad consensus implied without proof.',
    T4_CAPABILITY_OVERREACH: 'Capability overstated beyond constraints.',
    T5_ABSOLUTE_LANGUAGE:    'Absolute language where nuance would be honest.',
    T6_CONSTRAINT_DEFERRAL:  'Hard decisions pushed to later.',
    T7_CATEGORY_BLEND:       'Categories blended to obscure specifics.',
    T8_PRESSURE_OPTIMIZATION:'Urgency manufactured to force a decision.',
    T9_SCOPE_EXPANSION:      'Scope expanded without acknowledging the shift.',
    T10_AUTHORITY_IMPOSITION:'Authority asserted rather than explained.'
  };
  const FM = {
    UDDS: { n: 'Upstream Drift',      d: 'Agreement language before constraints are set.' },
    DCE:  { n: 'Deferred Enforcement', d: 'Hard decisions pushed to later.' },
    CCA:  { n: 'Constraint Collapse',  d: 'Vague claims bundled to obscure gaps.' }
  };

  function fmActive(pfm) {
    if (!pfm || typeof pfm !== 'object') return [];
    const out = [];
    ['UDDS','DCE','CCA'].forEach(k => {
      const obj = pfm[k];
      if (!obj) return;
      const state = String(obj[k.toLowerCase() + '_state'] || obj.state || '');
      if (state.includes('CONFIRMED') || state.includes('PROBABLE')) out.push({ k, state });
    });
    return out;
  }

  function fmtLabel(s) {
    return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  /* ── Interaction state ── */
  let activePattern = null;
  let currentText = '';
  let currentHL = [];

  function buildPatternButtons(container) {
    const grouped = {};
    currentHL.forEach(h => { grouped[h.pattern] = (grouped[h.pattern] || 0) + 1; });

    Object.keys(grouped).forEach(pattern => {
      const btn = document.createElement('button');
      btn.className = 'az-pattern-btn' + (activePattern === pattern ? ' active' : '');
      btn.textContent = fmtLabel(pattern) + ' (' + grouped[pattern] + ')';
      btn.addEventListener('click', () => {
        activePattern = activePattern === pattern ? null : pattern;
        renderInteractive();
      });
      container.appendChild(btn);
    });
  }

  function renderHighlightedText(container) {
    container.innerHTML = '';
    const sorted = currentHL.slice().sort((a, b) => a.start - b.start);
    let cursor = 0;

    sorted.forEach(h => {
      const s = Number(h.start), e = Number(h.end);
      if (s < cursor || e <= s) return;
      if (s > cursor) container.appendChild(document.createTextNode(currentText.slice(cursor, s)));

      const span = document.createElement('span');
      span.textContent = currentText.slice(s, e);
      span.className = 'az-hl pattern-' + (h.pattern || 'unknown');
      if (activePattern && h.pattern !== activePattern) span.classList.add('dimmed');
      span.title = h.category || h.pattern || '';
      container.appendChild(span);
      cursor = e;
    });
    if (cursor < currentText.length) container.appendChild(document.createTextNode(currentText.slice(cursor)));
  }

  /* ── Render full interactive result ── */
  function renderInteractive() {
    const data = renderInteractive._data;
    const nii   = data.nii && data.nii.nii_score;
    const label = (data.nii && data.nii.nii_label) || '';
    const tilt  = data.tilt_taxonomy || [];
    const fails = fmActive(data.parent_failure_modes);
    const color = nii >= 80 ? 'var(--accent)' : nii >= 60 ? 'var(--amber)' : 'var(--red)';

    let html = '<div class="az-card az-results-card">';

    // Pattern buttons
    html += '<div id="az-pattern-buttons" class="az-pattern-bar"></div>';

    // Explainer
    html += '<div id="az-pattern-explainer" class="az-pattern-explainer' + (activePattern ? '' : ' hidden') + '">';
    if (activePattern) html += esc(PATTERN_EXPLAIN[activePattern] || 'Pattern detected.');
    html += '</div>';

    // Highlighted text
    html += '<div id="az-highlighted-text" class="az-highlighted-text"></div>';

    // Score
    if (nii != null) {
      html += '<div style="margin-top:16px;font-family:var(--mono);font-size:32px;font-weight:700;color:' + color + '">' + esc(nii) + '</div>';
      html += '<div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px">' + esc(label) + '</div>';
    }

    // Tilt
    if (tilt.length) {
      html += '<div style="margin-top:16px"><div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">WHAT THE CORE DETECTED</div><ul class="az-list">';
      tilt.forEach(t => { html += '<li>' + esc(TILT[t] || t) + '</li>'; });
      html += '</ul></div>';
    }

    // Failure modes
    if (fails.length) {
      html += '<div style="margin-top:16px"><div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">STRUCTURAL RISKS</div><ul class="az-list">';
      fails.forEach(f => {
        const h = FM[f.k];
        html += '<li>' + esc(h ? h.n + ' \u2014 ' + h.d : f.k + ': ' + f.state) + '</li>';
      });
      html += '</ul></div>';
    }

    // Dimensions from raw API
    const dims = data.nii || {};
    const dimKeys = Object.keys(dims).filter(k => k.startsWith('d') && k.includes('_') && typeof dims[k] === 'number');
    if (dimKeys.length) {
      html += '<div style="margin-top:16px"><div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">DIMENSIONS</div>';
      dimKeys.forEach(k => {
        const pct = Math.round(dims[k] * 100);
        const c = pct >= 80 ? 'var(--accent)' : pct >= 60 ? 'var(--amber)' : 'var(--red)';
        html += '<div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;margin-bottom:4px">';
        html += '<span style="color:var(--muted)">' + esc(k) + '</span>';
        html += '<span style="color:' + c + ';font-weight:700">' + pct + '%</span></div>';
      });
      html += '</div>';
    }

    html += '<div style="margin-top:16px"><button class="az-btn" id="newBtn">New text</button></div>';
    html += '</div>';

    results.innerHTML = html;
    results.style.display = '';
    inputCard.style.display = 'none';

    // Wire interactive elements after DOM is set
    buildPatternButtons(document.getElementById('az-pattern-buttons'));
    renderHighlightedText(document.getElementById('az-highlighted-text'));

    document.getElementById('newBtn').addEventListener('click', () => {
      input.value = '';
      inputCard.style.display = '';
      results.style.display = 'none';
      activePattern = null;
      input.focus();
    });
  }

  /* ── Run ── */
  runBtn.addEventListener('click', async () => {
    const text = input.value.trim();
    if (!text) return;
    runBtn.disabled = true; runBtn.textContent = 'Scoring\u2026';
    try {
      const res = await fetch('/nti', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      if (data.error) {
        results.innerHTML = '<div class="az-card" style="color:var(--red)">' + esc(data.error) + '</div>';
        results.style.display = '';
      } else {
        currentText = text;
        currentHL = data.highlights || [];
        activePattern = null;
        renderInteractive._data = data;
        renderInteractive();
      }
    } catch (e) {
      results.innerHTML = '<div class="az-card" style="color:var(--red)">Error: ' + esc(e.message) + '</div>';
      results.style.display = '';
    } finally {
      runBtn.disabled = false; runBtn.textContent = 'Score';
    }
  });
})();
</script>
{% endblock %}
